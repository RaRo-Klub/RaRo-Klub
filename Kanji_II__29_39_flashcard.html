  { kanji: "下車", hiragana: "げしゃ", meaning: "leszállás", emoji: "🚶‍♂️" },
  { kanji: "乗る", hiragana: "のる", meaning: "felszállni, ráülni", emoji: "🚍" },
  { kanji: "乗り換える", hiragana: "のりかえる", meaning: "átszállni", emoji: "🔄" },
  { kanji: "京都", hiragana: "きょうと", meaning: "Kiotó", emoji: "⛩️" },
  { kanji: "都合", hiragana: "つごう", meaning: "körülmények, alkalom", emoji: "📋" },
  { kanji: "都", hiragana: "みやこ", meaning: "főváros", emoji: "🏯" },
];

let cards = [...allCards];
let current = 0;
let isFlipped = false;
let correct = 0;
let wrong = 0;
let answered = new Set();
let wrongCards = new Set();
let mode = 'all';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', ['all','wrong','learn'][i] === m);
  });
  if (m === 'wrong') {
    cards = allCards.filter((_, i) => wrongCards.has(i));
    if (cards.length === 0) { alert('Még nincsenek hibás kártyák!'); cards = [...allCards]; mode = 'all'; return; }
  } else {
    cards = [...allCards];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('answerBtns').classList.remove('visible');
  render();
}

function shuffle() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('answerBtns').classList.remove('visible');
  render();
}

function render() {
  const c = cards[current];
  document.getElementById('frontHiragana').textContent = c.hiragana;
  document.getElementById('frontMeaning').textContent = c.meaning;
  document.getElementById('backKanji').textContent = c.kanji;
  document.getElementById('backEmoji').textContent = c.emoji;
  const pct = Math.round((current + 1) / cards.length * 100);
  document.getElementById('progressText').textContent = `${current + 1} / ${cards.length}`;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === cards.length - 1;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statLeft').textContent = cards.length - answered.size;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  document.getElementById('answerBtns').classList.toggle('visible', isFlipped);
}

function navigate(dir) {
  if (current + dir < 0 || current + dir >= cards.length) return;
  current += dir;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('answerBtns').classList.remove('visible');
  render();
}

function markAnswer(isCorrect) {
  const origIdx = allCards.indexOf(cards[current]);
  if (!answered.has(current)) {
    answered.add(current);
    if (isCorrect) { correct++; wrongCards.delete(origIdx); }
    else { wrong++; wrongCards.add(origIdx); }
  }
  render();
  setTimeout(() => navigate(1), 400);
}

function resetStats() {
  correct = 0; wrong = 0; answered = new Set(); wrongCards = new Set();
  current = 0; isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('answerBtns').classList.remove('visible');
  cards = [...allCards];
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
  if (e.key === 'y' || e.key === 'Y') { if(isFlipped) markAnswer(true); }
  if (e.key === 'n' || e.key === 'N') { if(isFlipped) markAnswer(false); }
});

render();
</script>
</body>
</html>
