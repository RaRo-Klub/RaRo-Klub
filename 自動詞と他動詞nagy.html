<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 自動詞・他動詞 Képes Kártyák</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#3a006f;--bg2:#6a0dad;--bg3:#9b30d4;
  --card-w:160px;--card-h:220px;
  --gold:#ffd700;--teal:#00e5ff;--pink:#ff69b4;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg1) 100%);
  font-family:'Noto Sans JP',sans-serif;
  overflow-x:hidden;
}
/* ── BG stars ── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}

/* ── Header ── */
header{text-align:center;padding:28px 16px 12px;position:relative;z-index:2;}
h1{font-family:'Fredoka One',cursive;font-size:clamp(22px,5vw,46px);color:#fff;
  text-shadow:0 3px 20px rgba(0,0,0,.4);letter-spacing:3px;}
.subtitle{color:rgba(255,255,255,.75);font-size:14px;margin-top:6px;font-weight:700;}

/* ── Set nav ── */
.set-nav{display:flex;align-items:center;justify-content:center;gap:10px;
  flex-wrap:wrap;padding:10px 16px 22px;position:relative;z-index:2;}
.set-btn{padding:8px 18px;border-radius:50px;border:2px solid rgba(255,255,255,.6);
  background:transparent;color:#fff;font-weight:800;font-size:13px;cursor:pointer;
  transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
.set-btn.active{background:#fff;color:var(--bg2);box-shadow:0 4px 18px rgba(0,0,0,.25);transform:translateY(-2px);}
.set-btn:hover:not(.active){background:rgba(255,255,255,.18);}

/* ── Mode toggle ── */
.mode-row{display:flex;gap:8px;justify-content:center;padding-bottom:18px;position:relative;z-index:2;}
.mode-btn{padding:8px 20px;border-radius:50px;border:2px solid rgba(255,255,255,.5);
  background:transparent;color:#fff;font-size:13px;font-weight:800;cursor:pointer;
  transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
.mode-btn.active{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#3a006f;border-color:transparent;
  box-shadow:0 3px 14px rgba(255,165,0,.5);}

/* ── Cards grid ── */
.cards-wrap{position:relative;z-index:2;padding:0 14px 40px;}
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));
  gap:14px;
  max-width:900px;
  margin:0 auto;
}

/* ── Single card ── */
.card-scene{
  width:100%;aspect-ratio:3/4;cursor:pointer;
  perspective:900px;
  position:relative;
}
.card-inner{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .65s cubic-bezier(.4,1.6,.6,1);
  position:relative;
}
.card-scene.flipped .card-inner{transform:rotateY(180deg);}
.card-face{
  position:absolute;inset:0;border-radius:20px;
  backface-visibility:hidden;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 6px 24px rgba(0,0,0,.35);
}
.card-back-face{transform:rotateY(180deg);}

/* ── Illustration area ── */
.illus{
  flex:0 0 52%;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;font-size:0;
}
.illus .scene{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;
  position:relative;
}
.illus .emoji-big{font-size:clamp(30px,6vw,42px);line-height:1;z-index:1;position:relative;}
.illus .emoji-sm{font-size:clamp(18px,3.5vw,24px);z-index:1;position:relative;}
.illus .actor{font-size:clamp(22px,4.5vw,30px);z-index:1;position:relative;}
.illus .arrow{font-size:16px;opacity:.8;z-index:1;position:relative;}

/* Animated elements */
.bounce{animation:bounce 1s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.spin{animation:spin 2.5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.shake{animation:shake 1.2s ease-in-out infinite;}
@keyframes shake{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.float{animation:float 2s ease-in-out infinite alternate;}
@keyframes float{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-10px) rotate(5deg)}}
.wave{animation:wave 1.8s ease-in-out infinite;}
@keyframes wave{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.6) scaleY(1.3)}}
.glow{animation:glow 1.5s ease-in-out infinite alternate;}
@keyframes glow{from{filter:brightness(1)}to{filter:brightness(1.6) drop-shadow(0 0 8px gold)}}
.fall{animation:fall 1.5s ease-in infinite;}
@keyframes fall{0%{transform:translateY(-10px) rotate(0)}100%{transform:translateY(15px) rotate(180deg);opacity:0}}
.rise{animation:rise 1.5s ease-out infinite;}
@keyframes rise{0%{transform:translateY(10px);opacity:.5}100%{transform:translateY(-10px);opacity:0}}

/* ── Card text area ── */
.card-text{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 10px 10px;gap:3px;
}
.particle-badge{
  font-size:10px;font-weight:800;letter-spacing:1px;padding:2px 10px;border-radius:50px;
  margin-bottom:2px;
}
.vi-badge{background:rgba(255,215,0,.25);color:#ffd700;border:1.5px solid #ffd700;}
.vt-badge{background:rgba(0,229,255,.2);color:#00e5ff;border:1.5px solid #00e5ff;}
.jp-main{font-size:clamp(13px,2.5vw,16px);font-weight:900;text-align:center;line-height:1.3;}
.jp-read{font-size:clamp(10px,1.8vw,12px);opacity:.75;text-align:center;}
.hu-text{font-size:clamp(10px,1.8vw,11px);text-align:center;margin-top:2px;font-weight:700;opacity:.9;}
.tap-hint{font-size:9px;opacity:.45;margin-top:3px;letter-spacing:1px;}
.pair-num{position:absolute;top:8px;left:10px;font-size:10px;opacity:.5;font-weight:700;color:#fff;}

/* ── VI front: warm purple → gold ── */
.vi-face{background:linear-gradient(160deg,#4a1080 0%,#7b2ab5 60%,#5c1e90 100%);}
.vi-illus{background:linear-gradient(180deg,rgba(255,215,0,.18) 0%,rgba(74,16,128,.0) 100%);}

/* ── VT back: deep blue-purple ── */
.vt-face{background:linear-gradient(160deg,#1a0040 0%,#3d0070 60%,#5c1e90 100%);}
.vt-illus{background:linear-gradient(180deg,rgba(0,229,255,.15) 0%,rgba(26,0,64,.0) 100%);}

/* ── Info bar ── */
.info-bar{
  display:flex;align-items:center;justify-content:space-between;
  max-width:900px;margin:0 auto 14px;padding:0 4px;
  color:rgba(255,255,255,.8);font-size:13px;font-weight:700;
  position:relative;z-index:2;
}
.flip-all-btn{padding:7px 16px;border-radius:50px;
  border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.12);
  color:#fff;font-size:12px;font-weight:800;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
.flip-all-btn:hover{background:rgba(255,255,255,.25);}

/* ── Quiz overlay ── */
.quiz-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(20,0,50,.92);backdrop-filter:blur(10px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  padding:20px;
}
.quiz-overlay.show{display:flex;}
.quiz-card-big{
  width:min(420px,95vw);background:linear-gradient(135deg,#3d0070,#6a0dad);
  border-radius:24px;padding:28px;text-align:center;
  border:2px solid rgba(255,255,255,.25);
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.quiz-illus-big{
  width:100%;height:160px;border-radius:16px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);font-size:60px;position:relative;overflow:hidden;
}
.quiz-q{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;}
.quiz-read{font-size:14px;color:rgba(255,255,255,.7);}
.quiz-ask{font-size:14px;color:#ffd700;font-weight:800;margin-top:8px;}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(420px,95vw);}
.qc{
  padding:14px 10px;border-radius:16px;border:2px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.1);color:#fff;font-weight:800;font-size:14px;
  cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;
  text-align:center;line-height:1.4;
}
.qc:hover:not(:disabled){background:rgba(255,255,255,.25);transform:scale(1.03);}
.qc.correct{background:#00c853!important;border-color:#00c853!important;color:#fff!important;}
.qc.wrong{background:#e53935!important;border-color:#e53935!important;color:#fff!important;}
.qc.dim{background:rgba(255,255,255,.05)!important;color:rgba(255,255,255,.35)!important;}
.quiz-score-bar{color:#fff;font-weight:800;font-size:16px;}
.quiz-close{padding:10px 28px;border-radius:50px;border:2px solid rgba(255,255,255,.5);
  background:transparent;color:#fff;font-weight:800;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:14px;transition:all .2s;}
.quiz-close:hover{background:rgba(255,255,255,.2);}
.quiz-prog-wrap{width:min(420px,95vw);height:6px;background:rgba(255,255,255,.15);border-radius:50px;overflow:hidden;}
.quiz-prog{height:100%;background:linear-gradient(90deg,#ffd700,#ff69b4);border-radius:50px;transition:width .5s;}
.result-line{font-size:16px;font-weight:900;color:#fff;min-height:22px;text-align:center;}

/* ── Flower / Tanuki ── */
#fr{position:fixed;inset:0;pointer-events:none;z-index:200;}
.pt{position:absolute;top:-50px;animation:pf linear forwards;}
@keyframes pf{to{transform:translateY(110vh) rotate(540deg);opacity:0;}}
#tnk{position:fixed;bottom:18px;right:18px;font-size:72px;z-index:190;display:none;
  animation:tb .4s ease infinite alternate;filter:drop-shadow(0 5px 12px rgba(0,0,0,.35));}
@keyframes tb{from{transform:translateY(0) rotate(-12deg)}to{transform:translateY(-18px) rotate(12deg)}}
</style>
</head>
<body>

<!-- Stars bg -->
<div class="stars" id="stars"></div>
<div id="fr"></div>
<div id="tnk">🦝</div>

<header>
  <h1>🌸 自動詞・他動詞 🌸</h1>
  <p class="subtitle">Képes gyakorló kártyák — kattints a kártyára a fordításhoz!</p>
</header>

<!-- Set navigation -->
<div class="set-nav">
  <button class="set-btn active" onclick="loadSet(0,this)">Set 1 (1–20)</button>
  <button class="set-btn" onclick="loadSet(1,this)">Set 2 (21–40)</button>
  <button class="set-btn" onclick="loadSet(2,this)">Set 3 (41–60)</button>
  <button class="set-btn" onclick="loadSet(3,this)">Set 4 (61–70)</button>
</div>
<div class="mode-row">
  <button class="mode-btn active" id="browse-btn" onclick="setMode('browse')">🃏 Böngészés</button>
  <button class="mode-btn" id="quiz-btn" onclick="setMode('quiz')">❓ Kvíz</button>
</div>

<div class="cards-wrap">
  <div class="info-bar">
    <span id="set-info">1–20 / 70 ige</span>
    <button class="flip-all-btn" onclick="flipAllCards()">🔄 Mind fordítása</button>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- Quiz overlay -->
<div class="quiz-overlay" id="quiz-overlay">
  <div class="quiz-score-bar" id="qs-bar">Pontok: 0 / 0</div>
  <div class="quiz-prog-wrap"><div class="quiz-prog" id="qprog" style="width:0%"></div></div>
  <div class="quiz-card-big" id="qcard">
    <div class="quiz-illus-big" id="qillus"></div>
    <div class="quiz-q" id="qq"></div>
    <div class="quiz-read" id="qread"></div>
    <div class="quiz-ask" id="qask"></div>
  </div>
  <div class="quiz-choices" id="qchoices"></div>
  <div class="result-line" id="qresult"></div>
  <button class="quiz-close" onclick="closeQuiz()">✕ Bezár</button>
</div>

   vt_s:`<div class="actor">🧑</div><div class="emoji-sm">🖐️→💧</div>`},
];

// Split into sets of 20
const SETS = [
  VERBS.slice(0,20),
  VERBS.slice(20,40),
  VERBS.slice(40,60),
  VERBS.slice(60,70),
];

let currentSet = 0;
let mode = 'browse';
let allFlipped = false;

// ─── Stars ───────────────────────────────
(()=>{
  const s=document.getElementById('stars');
  for(let i=0;i<70;i++){
    const d=document.createElement('div');
    d.className='star';
    d.style.left=Math.random()*100+'%';
    d.style.top=Math.random()*100+'%';
    d.style.animationDelay=Math.random()*3+'s';
    d.style.animationDuration=(2+Math.random()*3)+'s';
    d.style.width=d.style.height=(1+Math.random()*2.5)+'px';
    s.appendChild(d);
  }
})();

// ─── Sound ───────────────────────────────
function playOK(){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [[523,0],[659,.12],[784,.24],[1047,.36]].forEach(([f,t])=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type="sine";
      const T=c.currentTime+t;
      g.gain.setValueAtTime(.25,T);g.gain.exponentialRampToValueAtTime(.001,T+.35);
      o.start(T);o.stop(T+.35);
    });
  }catch(e){}
}
function playNG(){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [[320,0],[260,.15],[200,.3]].forEach(([f,t])=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type="sawtooth";
      const T=c.currentTime+t;
      g.gain.setValueAtTime(.18,T);g.gain.exponentialRampToValueAtTime(.001,T+.3);
      o.start(T);o.stop(T+.3);
    });
  }catch(e){}
}

// ─── Effects ─────────────────────────────
function showFlowers(){
  const r=document.getElementById('fr'); r.innerHTML='';
  const em=['🌸','🌺','🌷','🌼','💮','⭐','✨'];
  for(let i=0;i<26;i++){
    const p=document.createElement('div'); p.className='pt';
    p.textContent=em[Math.floor(Math.random()*em.length)];
    p.style.left=Math.random()*100+'%';
    p.style.fontSize=(12+Math.random()*16)+'px';
    const dur=1.4+Math.random()*1.8;
    p.style.animation=`pf ${dur}s linear ${Math.random()*.7}s forwards`;
    r.appendChild(p);
  }
  setTimeout(()=>r.innerHTML='',3200);
}
function showTanuki(){
  const t=document.getElementById('tnk');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2200);
}

// ─── Render cards ─────────────────────────
function loadSet(idx, btn){
  currentSet=idx; allFlipped=false;
  document.querySelectorAll('.set-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function setMode(m){
  mode=m;
  document.getElementById('browse-btn').classList.toggle('active',m==='browse');
  document.getElementById('quiz-btn').classList.toggle('active',m==='quiz');
  if(m==='quiz') startQuiz();
}

function renderCards(){
  const grid=document.getElementById('cards-grid');
  grid.innerHTML='';
  const set=SETS[currentSet];
  const start=currentSet*20+1;
  const end=start+set.length-1;
  document.getElementById('set-info').textContent=`${start}–${end} / 70 ige`;
  set.forEach(v=>{
    const scene=document.createElement('div');
    scene.className='card-scene';
    scene.id='cs-'+v.id;
    scene.onclick=()=>flipCard(v.id);
    scene.innerHTML=makeCard(v);
    grid.appendChild(scene);
  });
}

function makeCard(v){
  return `
  <div class="card-inner">
    <!-- FRONT: VI -->
    <div class="card-face vi-face">
      <span class="pair-num">#${v.id}</span>
      <div class="illus vi-illus">
        <div class="scene" style="background:${v.bg}">
          ${v.vi_s}
        </div>
      </div>
      <div class="card-text" style="background:linear-gradient(180deg,#3a006f,#5c1e90)">
        <div class="particle-badge vi-badge">自動詞 ～が…</div>
        <div class="jp-main" style="color:#ffe082">${v.vi}</div>
        <div class="jp-read" style="color:rgba(255,214,0,.65)">${v.vir}</div>
        <div class="hu-text" style="color:#e8c5ff">${v.hu_vi}</div>
        <div class="tap-hint" style="color:#fff">TAP →</div>
      </div>
    </div>
    <!-- BACK: VT -->
    <div class="card-face card-back-face vt-face">
      <span class="pair-num" style="color:#00e5ff">#${v.id}</span>
      <div class="illus vt-illus">
        <div class="scene" style="background:${v.bg}">
          ${v.vt_s}
        </div>
      </div>
      <div class="card-text" style="background:linear-gradient(180deg,#1a0040,#2d006f)">
        <div class="particle-badge vt-badge">他動詞 ～を…</div>
        <div class="jp-main" style="color:#00e5ff">${v.vt}</div>
        <div class="jp-read" style="color:rgba(0,229,255,.65)">${v.vtr}</div>
        <div class="hu-text" style="color:#b3e5fc">${v.hu_vt}</div>
        <div class="tap-hint" style="color:#fff">TAP →</div>
      </div>
    </div>
  </div>`;
}

function flipCard(id){
  const el=document.getElementById('cs-'+id);
  if(el) el.classList.toggle('flipped');
}

function flipAllCards(){
  const set=SETS[currentSet];
  allFlipped=!allFlipped;
  set.forEach(v=>{
    const el=document.getElementById('cs-'+v.id);
    if(el) el.classList.toggle('flipped',allFlipped);
  });
}

// ─── Quiz ─────────────────────────────────
let qData=[], qIdx=0, qScore=0;

function startQuiz(){
  const set=SETS[currentSet];
  // Build 20 questions from current set — mix vi→vt and vt→vi
  qData = shuffle([...set]).map(v=>{
    const isVi2Vt = Math.random()<0.5;
    const pool = VERBS.filter(x=>x.id!==v.id);
    if(isVi2Vt){
      const wrongs = shuffle(pool).slice(0,3).map(x=>({text:x.vt,read:x.vtr}));
      return {
        v, type:'vi2vt',
        question: v.vi, qread: v.vir,
        ask: '⬆️ Melyik a tárgyas (他動詞) párja?',
        illus_s: v.vi_s, bg: v.bg,
        correct: {text:v.vt,read:v.vtr},
        choices: shuffle([{text:v.vt,read:v.vtr},...wrongs])
      };
    } else {
      const wrongs = shuffle(pool).slice(0,3).map(x=>({text:x.vi,read:x.vir}));
      return {
        v, type:'vt2vi',
        question: v.vt, qread: v.vtr,
        ask: '⬆️ Melyik a tárgyatlan (自動詞) párja?',
        illus_s: v.vt_s, bg: v.bg,
        correct: {text:v.vi,read:v.vir},
        choices: shuffle([{text:v.vi,read:v.vir},...wrongs])
      };
    }
  });
  qIdx=0; qScore=0;
  document.getElementById('quiz-overlay').classList.add('show');
  renderQuizQ();
}

function renderQuizQ(){
  const total=qData.length;
  if(qIdx>=total){
    const pct=Math.round(qScore/total*100);
    document.getElementById('qcard').innerHTML=`
      <div style="font-size:70px">${qScore===total?'🏆':qScore>=total*.7?'🌸':'🦝'}</div>
      <div style="font-family:'Fredoka One',cursive;font-size:32px;color:#fff;margin:10px 0">Vége!</div>
      <div style="font-size:18px;color:rgba(255,255,255,.85)">${qScore} / ${total} pont (${pct}%)</div>`;
    document.getElementById('qchoices').innerHTML='';
    document.getElementById('qresult').textContent='';
    document.getElementById('qs-bar').textContent=`✅ ${qScore} / ${total}`;
    return;
  }
  const q=qData[qIdx];
  document.getElementById('qs-bar').textContent=`Pontok: ${qScore} / ${qIdx}`;
  document.getElementById('qprog').style.width=((qIdx/total)*100)+'%';
  document.getElementById('qillus').style.background=q.bg;
  document.getElementById('qillus').innerHTML=`<div style="font-size:48px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">${q.illus_s}</div>`;
  document.getElementById('qq').textContent=q.question;
  document.getElementById('qread').textContent=q.qread;
  document.getElementById('qask').textContent=q.ask;
  document.getElementById('qresult').textContent='';
  document.getElementById('qchoices').innerHTML = q.choices.map((c,i)=>
    `<button class="qc" onclick="answerQ(${i})">${c.text}<br><span style="font-size:11px;opacity:.65">${c.read}</span></button>`
  ).join('');
}

function answerQ(choiceIdx){
  const q=qData[qIdx];
  const chosen=q.choices[choiceIdx];
  const correct=chosen.text===q.correct.text;
  document.querySelectorAll('.qc').forEach((b,i)=>{
    b.disabled=true;
    if(q.choices[i].text===q.correct.text) b.classList.add('correct');
    else if(i===choiceIdx&&!correct) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  const rl=document.getElementById('qresult');
  if(correct){
    qScore++;
    playOK(); showFlowers();
    rl.innerHTML='✅ Helyes! 🌸';
  } else {
    playNG(); showTanuki();
    rl.innerHTML=`❌ Helyes: ${q.correct.text}`;
  }
  document.getElementById('qs-bar').textContent=`Pontok: ${qScore} / ${qIdx+1}`;
  document.getElementById('qprog').style.width=(((qIdx+1)/qData.length)*100)+'%';
  setTimeout(()=>{ qIdx++; renderQuizQ(); }, 1700);
}

function closeQuiz(){
  document.getElementById('quiz-overlay').classList.remove('show');
  document.getElementById('browse-btn').classList.add('active');
  document.getElementById('quiz-btn').classList.remove('active');
  mode='browse';
}

function shuffle(a){ return a.sort(()=>Math.random()-.5); }

// Init
renderCards();
</script>
</body>
</html>
