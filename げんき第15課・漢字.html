<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第15課 · 読み物練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=Zen+Antique&family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
:root{
  --pink1:#f8bbd0;--pink2:#fce4ec;--pink3:#f48fb1;
  --blue1:#b3e5fc;--blue2:#e1f5fe;--blue3:#4fc3f7;
  --purple:#ce93d8;--green2:#a5d6a7;--amber:#ffe082;
  --text:#3a2040;--text2:rgba(58,32,64,.6);
  --ok:#1b5e20;--okl:#c8e6c9;--err:#b71c1c;--errl:#ffcdd2;
  --gc:rgba(255,255,255,.88);--border:rgba(180,120,160,.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;font-family:"Noto Sans JP",sans-serif;color:var(--text);overflow-x:hidden;position:relative;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.float-el{position:fixed;pointer-events:none;z-index:0;font-size:26px;animation:ffloat linear infinite;}
@keyframes ffloat{0%{transform:translateY(-60px) rotate(-8deg);opacity:0;}8%{opacity:.55;}90%{opacity:.5;}100%{transform:translateY(108vh) rotate(18deg);opacity:0;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes shakeb{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
@keyframes popIn{0%{transform:scale(.5);opacity:0;}80%{transform:scale(1.07);}100%{transform:scale(1);opacity:1;}}
@keyframes petalfly{0%{transform:translate(0,0) scale(.4) rotate(0deg);opacity:1;}100%{transform:translate(var(--dx),var(--dy)) scale(1.3) rotate(var(--dr));opacity:0;}}
@keyframes slideDown{from{max-height:0;opacity:0;}to{max-height:500px;opacity:1;}}

.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:14px 13px 70px;animation:fadeUp .35s ease;}

/* TITLE */
.page-title{text-align:center;margin-bottom:16px;}
.pt-badge{font-size:30px;display:block;margin-bottom:4px;}
.pt-jp{font-family:"Zen Antique",serif;font-size:26px;color:var(--text);text-shadow:0 1px 6px rgba(180,100,160,.2);}
.pt-hu{font-size:12px;color:var(--text2);margin-top:4px;}

/* NAV */
.nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;}
.nav-btn{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:rgba(255,255,255,.7);color:var(--text2);font-family:"Kosugi Maru",sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.nav-btn:hover,.nav-btn.active{background:var(--pink3);border-color:var(--pink3);color:#fff;}

/* SCORE BAR */
.score-bar{background:rgba(255,255,255,.8);border:1.5px solid var(--border);border-radius:14px;padding:10px 15px;margin-bottom:14px;display:none;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(180,100,160,.1);}
.score-bar.show{display:flex;}
.sv{font-family:"Zen Antique",serif;font-size:24px;color:var(--text);}
.sl{font-size:10px;color:var(--text2);}
.prog{flex:1;height:6px;background:rgba(180,100,160,.15);border-radius:3px;overflow:hidden;}
.prog-f{height:100%;background:linear-gradient(90deg,var(--pink3),var(--blue3));border-radius:3px;transition:width .5s;}

/* PANEL */
.panel{background:var(--gc);border:1.5px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 3px 18px rgba(180,100,160,.1);}

/* READING TEXT */
.text-section{margin-bottom:20px;}
.text-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.text-num{background:linear-gradient(135deg,var(--pink3),var(--blue3));color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.text-title{font-family:"Zen Antique",serif;font-size:18px;color:var(--text);}
.text-body{font-family:"Noto Serif JP",serif;font-size:15px;line-height:2.1;color:var(--text);}
.text-imgs{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0;justify-content:center;}
.text-imgs img{border-radius:10px;width:180px;height:140px;object-fit:cover;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.text-imgs .img-cap{font-size:11px;color:var(--text2);text-align:center;margin-top:3px;font-family:"Noto Serif JP",serif;}
.text-imgs .img-wrap{display:flex;flex-direction:column;align-items:center;}

/* BLANK */
.blank{display:inline-flex;align-items:center;justify-content:center;min-width:64px;height:30px;border-radius:8px;border:2px dashed rgba(180,100,160,.4);background:rgba(255,255,255,.7);margin:0 2px;font-family:"Noto Serif JP",serif;font-size:15px;color:var(--text);font-weight:700;cursor:pointer;transition:all .18s;vertical-align:middle;}
.blank:hover:not(.locked){border-color:var(--pink3);background:var(--pink2);}
.blank.sel{border-color:var(--pink3);background:var(--pink2);border-style:solid;}
.blank.correct-b{border-color:var(--ok)!important;background:var(--okl)!important;border-style:solid!important;color:var(--ok)!important;}
.blank.wrong-b{border-color:var(--err)!important;background:var(--errl)!important;border-style:solid!important;color:var(--err)!important;animation:shakeb .4s ease;}
.blank.locked{cursor:default;}
.word-opts{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0;}
.word-opt{padding:6px 13px;border-radius:18px;border:1.5px solid rgba(180,100,160,.25);background:rgba(255,255,255,.8);font-family:"Noto Serif JP",serif;font-size:14px;color:var(--text);cursor:pointer;transition:all .18s;}
.word-opt:hover:not(:disabled){border-color:var(--pink3);background:var(--pink2);}
.word-opt:disabled{opacity:.3;cursor:default;}

/* QUESTIONS */
.q-section{margin-top:14px;border-top:1px solid rgba(180,100,160,.15);padding-top:12px;}
.q-section h4{font-size:12px;letter-spacing:3px;color:rgba(180,100,160,.6);margin-bottom:8px;}
.q-item{margin-bottom:9px;}
.q-text{font-family:"Noto Serif JP",serif;font-size:14px;color:var(--text);padding:9px 12px;background:rgba(255,255,255,.6);border-radius:10px;border:1px solid rgba(180,100,160,.15);cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.q-text:hover{border-color:var(--pink3);background:var(--pink2);}
.q-text .q-arrow{font-size:14px;color:rgba(180,100,160,.5);flex-shrink:0;margin-top:1px;transition:transform .2s;}
.q-text.open .q-arrow{transform:rotate(90deg);}
.q-answer{display:none;font-family:"Noto Serif JP",serif;font-size:13.5px;color:var(--text);padding:9px 12px 9px 18px;background:linear-gradient(135deg,rgba(243,229,245,.7),rgba(225,245,254,.7));border-radius:0 0 10px 10px;border:1px solid rgba(180,100,160,.15);border-top:none;line-height:1.8;animation:slideDown .3s ease;}
.q-answer.open{display:block;}
.q-answer .ans-label{font-size:10px;letter-spacing:3px;color:rgba(180,100,160,.5);margin-bottom:4px;}

/* FEEDBACK */
.fb{margin-top:8px;font-size:12.5px;display:none;align-items:center;gap:6px;flex-wrap:wrap;}
.fb.show{display:flex;}
.fb.ok-f{color:var(--ok);}
.fb.err-f{color:var(--err);}
.fb .ca{font-family:"Noto Serif JP",serif;font-weight:700;}

/* VOCAB SECTION */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.vocab-card{background:rgba(255,255,255,.8);border:1.5px solid var(--border);border-radius:12px;padding:11px 12px;text-align:center;}
.vocab-card .vc-jp{font-family:"Noto Serif JP",serif;font-size:22px;color:var(--text);}
.vocab-card .vc-read{font-size:12px;color:var(--pink3);margin-top:3px;font-family:"Noto Serif JP",serif;}
.vocab-card .vc-hu{font-size:12px;color:var(--text2);margin-top:3px;}

/* FLIP CARDS */
.flip-wrap{perspective:900px;cursor:pointer;margin-bottom:10px;}
.flip-inner{position:relative;transform-style:preserve-3d;transition:transform .5s;border-radius:16px;min-height:175px;}
.flip-inner.flipped{transform:rotateY(180deg);}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;border:1.5px solid rgba(180,100,160,.2);}
.flip-front{background:linear-gradient(150deg,rgba(252,228,236,.95),rgba(225,245,254,.95));}
.flip-back{background:linear-gradient(150deg,rgba(232,245,233,.95),rgba(243,229,245,.95));transform:rotateY(180deg);}
.flip-face .fl{font-size:9px;letter-spacing:4px;color:rgba(180,100,160,.35);margin-bottom:8px;}
.flip-face .fj{font-family:"Noto Serif JP",serif;font-size:38px;color:var(--text);}
.flip-face .fr{font-family:"Noto Serif JP",serif;font-size:14px;color:var(--pink3);margin-top:5px;}
.flip-face .fh{font-size:20px;color:var(--ok);font-weight:700;text-align:center;line-height:1.4;}
.flip-face .fhint{font-size:9px;color:rgba(180,100,160,.25);letter-spacing:2px;margin-top:10px;}
.flip-nav{display:flex;gap:9px;margin-top:8px;}
.flip-nav button{flex:1;padding:11px;border-radius:10px;border:1.5px solid;font-family:"Kosugi Maru",sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.f-no{background:rgba(183,28,28,.1);border-color:rgba(229,115,115,.4);color:#c62828;}
.f-yes{background:rgba(27,94,32,.1);border-color:rgba(102,187,106,.4);color:#2e7d32;}
.f-no:hover{background:rgba(183,28,28,.2);}
.f-yes:hover{background:rgba(27,94,32,.2);}

/* MCQ */
.q-card{background:rgba(255,255,255,.8);border:1.5px solid var(--border);border-radius:14px;padding:14px 15px;margin-bottom:10px;transition:all .2s;}
.q-card.ok{border-color:var(--ok);background:rgba(200,230,201,.7);}
.q-card.err{border-color:var(--err);background:rgba(255,205,210,.7);}
.q-num-l{font-size:9px;letter-spacing:3px;color:rgba(180,100,160,.4);margin-bottom:7px;}
.q-jp2{font-family:"Noto Serif JP",serif;font-size:26px;color:var(--text);text-align:center;margin:6px 0;}
.q-read2{font-family:"Noto Serif JP",serif;font-size:13px;color:var(--pink3);text-align:center;margin-bottom:4px;}
.opts2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px;}
.opt2{padding:10px 8px;border-radius:10px;border:1.5px solid rgba(180,100,160,.2);background:rgba(255,255,255,.8);color:var(--text);font-size:13px;cursor:pointer;transition:all .18s;text-align:center;}
.opt2:hover:not(:disabled){border-color:var(--pink3);background:var(--pink2);}
.opt2.correct{background:var(--okl)!important;border-color:var(--ok)!important;color:var(--ok)!important;}
.opt2.wrong{background:var(--errl)!important;border-color:var(--err)!important;color:var(--err)!important;animation:shakeb .4s ease;}
.opt2.dim{opacity:.2;}
.opt2:disabled{cursor:default;}

/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.match-col{display:flex;flex-direction:column;gap:7px;}
.match-item{padding:10px 9px;border-radius:10px;border:1.5px solid rgba(180,100,160,.2);background:rgba(255,255,255,.8);color:var(--text);font-size:14px;cursor:pointer;transition:all .18s;text-align:center;min-height:46px;display:flex;align-items:center;justify-content:center;line-height:1.35;}
.match-item.jp-m{font-family:"Noto Serif JP",serif;font-size:18px;}
.match-item:hover:not(.done){border-color:var(--pink3);background:var(--pink2);}
.match-item.sel-m{border-color:var(--purple);background:rgba(206,147,216,.2);color:var(--text);}
.match-item.ok-m{border-color:var(--ok)!important;background:var(--okl)!important;color:var(--ok)!important;}
.match-item.err-m{border-color:var(--err)!important;background:var(--errl)!important;color:var(--err)!important;animation:shakeb .4s ease;}
.match-item.done{cursor:default;}

/* BTN */
.btn{padding:9px 18px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--pink3),var(--blue3));color:#fff;font-family:"Kosugi Maru",sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(180,100,160,.2);}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(180,100,160,.3);}
.btn:disabled{opacity:.4;cursor:default;transform:none;}
.btn-ghost{background:transparent;border:1.5px solid rgba(180,100,160,.3);color:var(--text2);}
.btn-ghost:hover{border-color:var(--pink3);color:var(--text);}

/* TANUKI */
#tanu{position:fixed;inset:0;z-index:990;display:none;align-items:center;justify-content:center;background:rgba(100,40,60,.3);backdrop-filter:blur(3px);}
#tanu.show{display:flex;}
.tanu-box{background:rgba(255,255,255,.95);border:3px solid var(--errl);border-radius:22px;padding:24px 22px 18px;text-align:center;max-width:270px;box-shadow:0 8px 30px rgba(0,0,0,.2);animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
.tanu-box .te{font-size:72px;display:block;margin-bottom:6px;}
.tanu-box .tm{font-family:"Kosugi Maru",sans-serif;font-size:14px;color:var(--err);margin-bottom:4px;}
.tanu-box .th{font-family:"Noto Serif JP",serif;font-size:13px;color:var(--text2);margin-bottom:12px;}
.tanu-box .tc{padding:9px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--pink3),var(--blue3));color:#fff;font-family:"Kosugi Maru",sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

.petal{position:fixed;pointer-events:none;z-index:999;font-size:20px;animation:petalfly .85s ease forwards;}
.final{text-align:center;background:rgba(255,255,255,.9);border:2px solid var(--pink1);border-radius:20px;padding:24px;margin-top:16px;display:none;}
.final-emoji{font-size:52px;margin-bottom:8px;display:block;}
.final-score{font-family:"Zen Antique",serif;font-size:48px;color:var(--text);}
.final-msg{font-size:13px;color:var(--text2);margin-top:6px;}
.final-btn{margin-top:14px;padding:11px 26px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--pink3),var(--blue3));color:#fff;font-family:"Kosugi Maru",sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.sec-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.sec-num{background:linear-gradient(135deg,var(--pink3),var(--blue3));color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.sec-title{font-family:"Zen Antique",serif;font-size:16px;color:var(--text);}
.sec-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.vocab-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.vocab-nav span{font-size:11px;color:var(--text2);}
.vocab-score-d{font-family:"Zen Antique",serif;font-size:20px;color:var(--text);}

ruby { display: inline-ruby; }
rt { font-size: 0.52em; color: var(--pink3); text-align: center; line-height: 1.1; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="tanu">
  <div class="tanu-box">
    <span class="te">🦝</span>
    <div class="tm" id="tm">もう一度！</div>
    <div class="th" id="th"></div>
    <button class="tc" onclick="closeTanu()">わかりました！</button>
  </div>
</div>
<div class="app">
  <div class="page-title">
    <span class="pt-badge">🗾🌸✈️</span>
    <div class="pt-jp">第15課 · 読み物</div>
    <div class="pt-hu">Genki 15. lecke · Olvasás + Szógyakorlás</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('reading')">📖 Szövegek</button>
    <button class="nav-btn" onclick="showTab('vocab')">📋 Szólista</button>
    <button class="nav-btn" onclick="showTab('flash')">🃏 Kártyák</button>
    <button class="nav-btn" onclick="showTab('match')">🔗 Párosítás</button>
    <button class="nav-btn" onclick="showTab('quiz')">❓ Kvíz</button>
  </div>
  <div class="score-bar" id="scorebar">
    <div><div class="sv" id="sc-v">0</div><div class="sl">helyes</div></div>
    <div class="prog"><div class="prog-f" id="sc-f" style="width:0%"></div></div>
    <div style="font-size:11px;color:var(--text2)" id="sc-l">0/0</div>
    <span style="font-size:22px">🌸</span>
  </div>
  <div id="content"></div>
  <div class="final" id="final">
    <span class="final-emoji">🌸🗾✨</span>
    <div class="final-score" id="fscore"></div>
    <div class="final-msg" id="fmsg"></div>
    <button class="final-btn" onclick="resetGame()">もう一度！ Újra!</button>
  </div>
</div>

(function(){

  resize();addEventListener("resize",resize);
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const g=ctx.createLinearGradient(0,0,c.width,c.height);
    g.addColorStop(0,"#fce4ec");g.addColorStop(.5,"#e8eaf6");g.addColorStop(1,"#e1f5fe");
    ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);

  }
  draw();addEventListener("resize",draw);
  const fs=["🌸","🌺","🌷","🏯","⛩️","🐦","🎴","🌸","🗾","🌸"];

      if(typeof seg==="string"){segsHTML+=seg;}
      else{
        const bid=`b_${t.id}_${si}`;
        blanks.push({bid,ans:seg.w,opts:seg.opts});
        total++;
        segsHTML+=`<span class="blank" id="${bid}" onclick="clickBlank('${bid}')">${seg.w.replace(/./g,"＿")}</span>`;

      <div class="text-body">${segsHTML}</div>
      <div class="word-opts" id="wopts_${t.id}">${optsHTML}</div>
      <div class="fb" id="fb_${t.id}"></div>
      <div class="q-section"><h4>C. 質問に答えてください</h4>${qHTML}</div>`;
    cont.appendChild(panel);
    // store blank data
    blanks.forEach(b=>window[b.bid]={...b,tid:t.id,filled:false});
  });
  updScore();
}

let _activeBid=null;
function clickBlank(bid){
  if(_blankDone[bid])return;
  if(_activeBid===bid){_activeBid=null;document.getElementById(bid)?.classList.remove("sel");return;}
  if(_activeBid){document.getElementById(_activeBid)?.classList.remove("sel");}
  _activeBid=bid;
  document.getElementById(bid)?.classList.add("sel");
}
function clickWordOpt(tid,word){
  if(!_activeBid)return;
  const bdata=window[_activeBid];
  if(!bdata||bdata.tid!==tid||bdata.filled)return;
  const blEl=document.getElementById(_activeBid);
  if(!blEl||blEl.classList.contains("locked"))return;
  blEl.textContent=word;
  blEl.classList.remove("sel");
  const ok=word===bdata.ans;
  bdata.filled=true;
  _blankDone[_activeBid]=true;
  _activeBid=null;
  if(ok){
    blEl.classList.add("correct-b","locked");
    correct++;updScore();playHappy();
    const r=blEl.getBoundingClientRect();flowers(r.left+r.width/2,r.top+r.height/2+scrollY);
  } else {
    blEl.classList.add("wrong-b","locked");
    playSad();
    showTanu(bdata.ans);
    setTimeout(()=>{blEl.textContent=bdata.ans;blEl.classList.remove("wrong-b");blEl.classList.add("correct-b");},1800);
  }
  checkGameDone();
}

function toggleQ(tid,qi){
  const h=document.getElementById(`qh_${tid}_${qi}`);
  const a=document.getElementById(`qa_${tid}_${qi}`);
  h.classList.toggle("open");a.classList.toggle("open");
}

// ── VOCAB LIST ────────────────────────────────────────────
function renderVocabList(){
  const cont=document.getElementById("content");
  const panel=document.createElement("div");panel.className="panel";
  panel.innerHTML=`<div class="sec-hdr"><div class="sec-num">📋</div><div><div class="sec-title">語彙リスト · Szólista</div><div class="sec-sub">${VOCAB.length} szó ebből a leckéből</div></div></div>
    <div class="vocab-grid">${VOCAB.map(v=>`<div class="vocab-card"><div class="vc-jp">${v.jp}</div><div class="vc-read">${v.r}</div><div class="vc-hu">${v.hu}</div></div>`).join("")}</div>`;
  cont.appendChild(panel);
}

// ── FLASH ─────────────────────────────────────────────────
function renderFlash(){
  const cont=document.getElementById("content");cont.innerHTML="";
  if(_flashIdx>=_flashDeck.length){
    cont.innerHTML=`<div class="panel" style="text-align:center"><div style="font-size:48px;margin-bottom:10px">🎉</div><div style="font-family:'Zen Antique',serif;font-size:22px">${_flashKnown}/${_flashDeck.length} ismert</div><button class="btn" style="margin-top:14px" onclick="_flashDeck=shuffle([...VOCAB]);_flashIdx=0;_flashKnown=0;total=_flashDeck.length;updScore();renderFlash()">Újra →</button></div>`;
    return;
  }
  const w=_flashDeck[_flashIdx];
  cont.innerHTML=`<div class="panel"><div style="font-size:11px;color:var(--text2);text-align:center;margin-bottom:8px">${_flashIdx+1} / ${_flashDeck.length} · ✓ ${_flashKnown}</div>
    <div class="flip-wrap" onclick="doFlip()"><div class="flip-inner" id="fi">
      <div class="flip-face flip-front"><div class="fl">JAPÁN · kattints</div><div class="fj">${w.jp}</div><div class="fr">${w.r}</div><div class="fhint">– kattints a fordításhoz –</div></div>
      <div class="flip-face flip-back"><div class="fl">MAGYAR · kattints vissza</div><div class="fj" style="font-size:46px">${w.jp}</div><div class="fr">${w.r}</div><div style="height:1px;width:60%;background:rgba(180,100,160,.2);margin:7px auto"></div><div class="fh">${w.hu}</div></div>
    </div></div>
    <div class="flip-nav"><button class="f-no" onclick="flashNext(false)">✗ Nem tudom</button><button class="f-yes" onclick="flashNext(true)">✓ Tudom!</button></div></div>`;
}
function doFlip(){const fi=document.getElementById("fi");if(fi)fi.classList.toggle("flipped");}
function flashNext(know){
  if(know){correct++;_flashKnown++;const el=document.querySelector(".flip-inner");if(el){const r=el.getBoundingClientRect();flowers(r.left+r.width/2,r.top+r.height/2+scrollY);}playHappy();}else playSad();
  _flashIdx++;updScore();renderFlash();
}

// ── MATCHING ──────────────────────────────────────────────
let _matchPairs=[],_matchDone=0;
function renderMatch(){
  _matchPairs=shuffle([...VOCAB]).slice(0,8);
  total=_matchPairs.length;updScore();_matchSelJp=null;_matchSelHu=null;_matchDone=0;
  const cont=document.getElementById("content");cont.innerHTML="";
  const panel=document.createElement("div");panel.className="panel";
  const jpS=shuffle([..._matchPairs]),huS=shuffle([..._matchPairs]);
  panel.innerHTML=`<div class="sec-hdr"><div class="sec-num">🔗</div><div><div class="sec-title">パーリング · Párosítás</div><div class="sec-sub">Japán → Magyar párok keresése</div></div></div>
    <div class="match-grid">
      <div class="match-col">${jpS.map(w=>`<div class="match-item jp-m" id="mj_${esc(w.jp)}" onclick="clickMatch('jp','${esc(w.jp)}')">${w.jp}<br><span style="font-size:10px;color:rgba(180,100,160,.45)">${w.r}</span></div>`).join("")}</div>
      <div class="match-col">${huS.map(w=>`<div class="match-item" id="mh_${esc(w.jp)}" onclick="clickMatch('hu','${esc(w.jp)}')">${w.hu}</div>`).join("")}</div>
    </div>
    <div class="fb" id="fb-match" style="margin-top:10px"></div>`;
  cont.appendChild(panel);
}
function clickMatch(side,key){
  const k=key.replace(/&#39;/g,"'");
  if(side==="jp"){
    if(_matchSelJp){document.getElementById("mj_"+_matchSelJp)?.classList.remove("sel-m");}
    _matchSelJp=k;document.getElementById("mj_"+k)?.classList.add("sel-m");
  } else {
    if(_matchSelHu){document.getElementById("mh_"+_matchSelHu)?.classList.remove("sel-m");}
    _matchSelHu=k;document.getElementById("mh_"+k)?.classList.add("sel-m");
  }
  if(_matchSelJp&&_matchSelHu){
    const jEl=document.getElementById("mj_"+_matchSelJp);
    const hEl=document.getElementById("mh_"+_matchSelHu);
    if(_matchSelJp===_matchSelHu){
      jEl?.classList.replace("sel-m","ok-m");jEl?.classList.add("done");
      hEl?.classList.replace("sel-m","ok-m");hEl?.classList.add("done");
      correct++;updScore();playHappy();
      const r=jEl?.getBoundingClientRect();if(r)flowers(r.left+r.width/2,r.top+r.height/2+scrollY);
      _matchDone++;if(_matchDone>=_matchPairs.length)checkGameDone();
    } else {
      jEl?.classList.add("err-m");hEl?.classList.add("err-m");
      setTimeout(()=>{jEl?.classList.remove("err-m","sel-m");hEl?.classList.remove("err-m","sel-m");},600);
      playSad();const w=_matchPairs.find(x=>x.jp===_matchSelJp);showTanu(w?w.hu:"");
    }
    _matchSelJp=null;_matchSelHu=null;
  }
}

// ── QUIZ ──────────────────────────────────────────────────
function renderQuiz(){
  const deck=shuffle([...VOCAB]);
  total=deck.length;updScore();
  const cont=document.getElementById("content");cont.innerHTML="";
  const panel=document.createElement("div");panel.className="panel";
  panel.innerHTML=`<div class="sec-hdr"><div class="sec-num">❓</div><div><div class="sec-title">語彙クイズ · Szókvíz</div><div class="sec-sub">Válaszd ki a helyes magyar jelentést!</div></div></div><div id="quiz-inner"></div>`;
  cont.appendChild(panel);
  const inner=document.getElementById("quiz-inner");
  deck.forEach((w,qi)=>{
    const wrongs=shuffle(VOCAB.filter(x=>x.hu!==w.hu)).slice(0,3).map(x=>x.hu);
    const opts=shuffle([w.hu,...wrongs]);
    const card=document.createElement("div");card.className="q-card";card.id="qc_"+qi;
    card.innerHTML=`<div class="q-num-l">${qi+1}. feladat</div><div class="q-jp2">${w.jp}</div><div class="q-read2">${w.r}</div>
      <div class="opts2">${opts.map(o=>`<button class="opt2" onclick="answerQuiz(${qi},'${esc(o)}','${esc(w.hu)}')">${o}</button>`).join("")}</div>
      <div class="fb" id="fb_q_${qi}"></div>`;
    inner.appendChild(card);
  });
}
function answerQuiz(qi,chosen,correct_ans){
  if(_mcqDone[qi])return;_mcqDone[qi]=true;
  const c=correct_ans.replace(/&#39;/g,"'"),ch=chosen.replace(/&#39;/g,"'");
  const card=document.getElementById("qc_"+qi);
  card.querySelectorAll(".opt2").forEach(b=>b.disabled=true);
  card.querySelectorAll(".opt2").forEach(b=>{const t=b.textContent.trim();if(t===c)b.classList.add("correct");else if(t===ch&&ch!==c)b.classList.add("wrong");else b.classList.add("dim");});
  const ok=ch===c;
  if(ok){correct++;const r=card.getBoundingClientRect();flowers(r.left+r.width/2,r.top+r.height/2+scrollY);playHappy();card.classList.add("ok");}
  else{playSad();card.classList.add("err");showTanu(c);}
  const fb=document.getElementById("fb_q_"+qi);fb.className="fb show "+(ok?"ok-f":"err-f");
  fb.innerHTML=ok?"✓ 正解！ Helyes! 🌸":`✗ Helyes: <span class="ca">${c}</span>`;
  updScore();checkGameDone();
}

// ── INIT ──────────────────────────────────────────────────
renderReading();
</script>
