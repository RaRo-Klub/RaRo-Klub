<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あげる・もらう・くれる – 練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red-light: #e74c3c;
    --red-pale: #fdecea;
    --red-dark: #8e1c11;
    --white: #ffffff;
    --off-white: #fff8f8;
    --correct: #2e7d52;
    --wrong: #c0392b;
    --neutral: #9e6a6a;
    --border: #e8b4b4;
    --ink: #2c1010;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--white);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(192,57,43,0.07) 39px, rgba(192,57,43,0.07) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(192,57,43,0.07) 39px, rgba(192,57,43,0.07) 40px);
  }

  /* ===== HEADER ===== */
  header {
    background: var(--red);
    color: white;
    text-align: center;
    padding: 2rem 1rem 1.6rem;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(142,28,17,0.4);
  }
  header::before {
    content: '日本語';
    font-family: 'Noto Serif JP', serif;
    font-size: 6rem;
    color: rgba(255,255,255,0.07);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    white-space: nowrap;
  }
  /* Decorative circles on header */
  header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 40px;
    background: white;
    border-radius: 50%;
    box-shadow: -80px 0 0 white, 80px 0 0 white, -160px 0 0 white, 160px 0 0 white,
                -240px 0 0 white, 240px 0 0 white, -320px 0 0 white, 320px 0 0 white,
                -400px 0 0 white, 400px 0 0 white;
  }
  h1 { font-family: 'Noto Serif JP', serif; font-size: 1.7rem; letter-spacing: 0.08em; position: relative; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.85); margin-top: 0.4rem; font-weight: 300; position: relative; }

  /* ===== LEGEND ===== */
  .verb-legend {
    display: flex; justify-content: center; gap: 1.5rem;
    padding: 1.2rem 1rem 0.8rem; flex-wrap: wrap;
    background: var(--off-white);
    border-bottom: 2px solid var(--border);
    margin-top: 20px;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--neutral); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot-ageru { background: #c0392b; } .dot-morau { background: #2e7d52; } .dot-kureru { background: #1565c0; }

  /* ===== PROGRESS ===== */
  .progress-bar-wrap { background: var(--border); height: 6px; }
  .progress-bar { height: 6px; background: linear-gradient(90deg, var(--red-dark), var(--red-light)); width: 0%; transition: width 0.5s ease; }
  .score-display { text-align: center; font-size: 0.82rem; color: var(--neutral); padding: 0.5rem; font-weight: 500; background: var(--off-white); }

  /* ===== MAIN ===== */
  main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 3rem; display: flex; flex-direction: column; gap: 1.2rem; }

  .section-title {
    font-family: 'Noto Serif JP', serif; font-size: 0.9rem;
    color: white; background: var(--red);
    letter-spacing: 0.12em; padding: 0.5rem 1rem;
    border-radius: 4px;
    display: flex; align-items: center; gap: 0.5rem;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--white); border: 2px solid var(--border); border-radius: 8px;
    padding: 1.3rem 1.5rem 1rem; box-shadow: 0 2px 10px rgba(192,57,43,0.08);
    transition: box-shadow 0.2s, border-color 0.3s; position: relative;
    overflow: visible;
  }
  .card:hover { box-shadow: 0 4px 18px rgba(192,57,43,0.15); border-color: #d4a0a0; }
  .card.card-correct { border-color: #81c995; background: #f0fff4; }
  .card.card-wrong { border-color: var(--red-light); background: #fff0f0; }

  .card-num {
    position: absolute; top: -12px; left: 1.2rem;
    background: var(--red); color: #fff; font-size: 0.7rem;
    padding: 2px 10px; border-radius: 10px; font-weight: 500;
    box-shadow: 0 2px 6px rgba(142,28,17,0.3);
  }

  .sentence {
    font-family: 'Noto Serif JP', serif; font-size: 1.05rem;
    line-height: 2.6; display: flex; flex-wrap: wrap; align-items: center;
  }

  /* ===== SELECT ===== */
  select {
    font-family: 'Noto Serif JP', serif; font-size: 1rem;
    border: none; border-bottom: 2px solid var(--red);
    background: transparent; color: var(--ink); cursor: pointer;
    padding: 0 0.2rem; outline: none; appearance: none; -webkit-appearance: none;
    min-width: 80px; text-align: center; transition: border-color 0.2s, color 0.2s;
    margin: 0 2px;
  }
  select:focus { border-color: var(--red-dark); }
  select.correct { border-color: var(--correct); color: var(--correct); font-weight: 700; }
  select.wrong { border-color: var(--wrong); color: var(--wrong); }
  select.unanswered { border-color: #d4a0a0; color: var(--neutral); }

  /* ===== RESULT MSG ===== */
  .result-msg { margin-top: 0.6rem; font-size: 0.82rem; min-height: 1.2rem; display: flex; gap: 0.8rem; flex-wrap: wrap; }
  .item-result { padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .item-result.ok { background: #e8f5e9; color: var(--correct); }
  .item-result.bad { background: #ffebee; color: var(--wrong); }

  /* ===== CHECK BUTTON ===== */
  .check-btn {
    display: block; margin: 0 auto 2rem;
    background: var(--red); color: #fff; border: none;
    padding: 0.8rem 3rem; font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem; border-radius: 6px; cursor: pointer;
    letter-spacing: 0.08em; transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 14px rgba(142,28,17,0.35);
  }
  .check-btn:hover { background: var(--red-dark); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(142,28,17,0.4); }
  .check-btn:active { transform: translateY(0); }

  /* ===== FINAL PANEL ===== */
  .final-panel {
    display: none; text-align: center; padding: 2rem;
    background: var(--white); border: 3px solid var(--red); border-radius: 12px;
    margin: 0 auto 2rem; max-width: 400px;
    box-shadow: 0 8px 30px rgba(192,57,43,0.2);
  }
  .final-panel.show { display: block; }
  .final-score { font-family: 'Noto Serif JP', serif; font-size: 3.5rem; color: var(--red); font-weight: 700; }
  .final-label { color: var(--neutral); margin-top: 0.5rem; font-size: 0.9rem; }
  .retry-btn {
    margin-top: 1rem; background: transparent; border: 2px solid var(--red);
    color: var(--red); padding: 0.5rem 1.5rem; font-family: 'Noto Sans JP', sans-serif;
    border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
  }
  .retry-btn:hover { background: var(--red); color: #fff; }

  /* ===== 🌸 FLOWER ANIMATION ===== */
  .flower-burst {
    position: fixed;
    pointer-events: none;
    font-size: 1.6rem;
    animation: flowerFly 1.4s ease-out forwards;
    z-index: 9999;
  }
  @keyframes flowerFly {
    0%   { opacity: 1; transform: translate(0, 0) scale(0.5) rotate(0deg); }
    40%  { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1.3) rotate(var(--tr)); }
    100% { opacity: 0; transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) - 80px)) scale(0.6) rotate(calc(var(--tr) * 2)); }
  }

  /* ===== 🦝 TANUKI ANIMATION ===== */
  .tanuki-popup {
    position: fixed;
    pointer-events: none;
    font-size: 2.8rem;
    animation: tanukiJump 1.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
    z-index: 9999;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }
  @keyframes tanukiJump {
    0%   { opacity: 0; transform: translateY(60px) scaleX(1) scaleY(0.6); }
    15%  { opacity: 1; transform: translateY(60px) scaleX(0.8) scaleY(1.2); }
    35%  { opacity: 1; transform: translateY(-120px) scaleX(1) scaleY(1) rotate(-10deg); }
    55%  { opacity: 1; transform: translateY(-80px) scaleX(1) scaleY(1) rotate(10deg); }
    75%  { opacity: 1; transform: translateY(-140px) scaleX(0.9) scaleY(1.1) rotate(-5deg); }
    90%  { opacity: 1; transform: translateY(20px) scaleX(1.1) scaleY(0.7); }
    100% { opacity: 0; transform: translateY(60px) scaleX(1) scaleY(0.5); }
  }

  /* Tanuki label */
  .tanuki-popup::after {
    content: attr(data-text);
    display: block;
    font-size: 0.5rem;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--red-dark);
    text-align: center;
    font-weight: 700;
  }

  /* Decorative wave top of main */
  .wave-divider {
    width: 100%; overflow: hidden; line-height: 0; background: var(--off-white);
  }
  .wave-divider svg { display: block; width: 100%; height: 30px; }
</style>
</head>
<body>

<div style="background:#f5f0e8; padding:0.8rem 1.5rem; border-bottom:1px solid #e8e2d5;">

     onmouseover="this.style.borderColor='#c8522a';this.style.color='#c8522a';"

<header>
  <h1>🌸 あげる・もらう・くれる 🌸</h1>
  <p class="subtitle">Válaszd ki a helyes prepozíciót és igét！</p>
</header>

<div class="wave-divider">
  <svg viewBox="0 0 1200 30" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,0 C150,30 350,0 600,20 C850,40 1050,10 1200,0 L1200,30 L0,30 Z" fill="#fff8f8"/>
  </svg>
</div>

<div class="verb-legend">
  <div class="legend-item"><span class="legend-dot dot-ageru"></span>&nbsp;あげる – én adok / valaki ad másnak</div>
  <div class="legend-item"><span class="legend-dot dot-morau"></span>&nbsp;もらう – én kapok / valaki kap</div>
  <div class="legend-item"><span class="legend-dot dot-kureru"></span>&nbsp;くれる – valaki ad nekem / csoportomnak</div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="score-display" id="scoreDisplay">0 / 0 kitöltve</div>

<main id="exerciseList"></main>

<div class="final-panel" id="finalPanel">
  <div style="font-size:2rem">🌸🦝🌸</div>
  <div class="final-score" id="finalScore">--</div>
  <div class="final-label">pont az összes feladatból</div>
  <div id="finalEmoji" style="font-size:1.5rem;margin-top:0.5rem"></div>
  <button class="retry-btn" onclick="resetAll()">🔄 もう一度！</button>
</div>
<button class="check-btn" onclick="checkAll()">すべて確認する ✓</button>

<!-- Emoji container for animations -->
<div id="animContainer"></div>

<script>
const exercises = [
  { section: "🌸 1. rész – Alapmondatok", sentences: [
    { parts: ["私はバクさん",null,"本をあげました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["バクさんはあいさん",null,"辞書をもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["ドーラさんはお母さん",null,"花を",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["去年のクリスマスに母は私",null,"セーターを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"くれました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["4年のクリスマスに私はそふ",null,"手袋をもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["父",null,"お酒を",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげます",options:["あげます","もらいます","くれます"]}] },
    { parts: ["先生",null,"紅茶を",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげます",options:["あげます","もらいます","くれます"]}] },
    { parts: ["友だち",null,"チョコレートを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげます",options:["あげます","もらいます","くれます"]}] }
  ]},
  { section: "🦝 2. rész – くれる ↔ もらう", sentences: [
    { parts: ["彼女",null,"マフラーを",null,"。"], blanks: [{correct:"が",options:["に","が","は"]},{correct:"くれました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["彼女",null,"マフラーをもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["両親",null,"お金を",null,"。"], blanks: [{correct:"が",options:["に","が","は"]},{correct:"くれました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["両親",null,"お金を",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"もらいました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["祖父",null,"ラジカセを",null,"。"], blanks: [{correct:"が",options:["に","が","は"]},{correct:"くれました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["祖父",null,"ラジカセを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"もらいました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["祖母",null,"手袋を",null,"。"], blanks: [{correct:"が",options:["に","が","は"]},{correct:"くれました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["祖母",null,"手袋をもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["おじ",null,"時計を",null,"。"], blanks: [{correct:"が",options:["に","が","は"]},{correct:"くれました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["おじ",null,"時計をもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["兄",null,"シャツを",null,"。"], blanks: [{correct:"が",options:["に","が","は"]},{correct:"くれました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["兄",null,"シャツをもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] }
  ]},
  { section: "🌸 3. rész – あげる ↔ もらう párban", sentences: [
    { parts: ["ヤスミンさんはカルロスさん",null,"トレーナーを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["カルロスさんはヤスミンさん",null,"トレーナーを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"もらいました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["カルロスさんはヤスミンさん",null,"チョコレートを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["ヤスミンさんはカルロスさん",null,"チョコレートを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"もらいました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["ヤスミンさんはわたし",null,"ぬいぐるみを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["わたしはヤスミンさん",null,"ぬいぐるみを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"もらいました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["メアリーさんはわたし",null,"手袋を",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["わたしはメアリーさん",null,"手袋をもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["たけしさんはメアリーさん",null,"花を",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["メアリーさんはたけしさん",null,"花を",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"もらいました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["ソラさんはわたし",null,"マンガを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["わたしはソラさん",null,"マンガをもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["ロバートさんはソラさん",null,"本を",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["ソラさんはロバートさん",null,"本をもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["ナオミさんはけんさん",null,"ネクタイを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["けんさんはナオミさん",null,"ネクタイをもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] },
    { parts: ["メアリーさんはたけしさん",null,"コンサートチケットを",null,"。"], blanks: [{correct:"に",options:["に","が","は"]},{correct:"あげました",options:["あげました","もらいました","くれました"]}] },
    { parts: ["たけしさんはメアリーさん",null,"コンサートチケットをもらいました。"], blanks: [{correct:"に",options:["に","が","は"]}] }
  ]}
];

let selectElements = [];
let checked = false;

/* ===== ANIMATIONS ===== */
const flowers = ['🌸','🌺','🌼','🌻','💮','🌷'];

function spawnFlower(x, y) {
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'flower-burst';
    el.textContent = flowers[Math.floor(Math.random() * flowers.length)];
    const angle = (i / 6) * 2 * Math.PI + Math.random() * 0.5;
    const dist = 60 + Math.random() * 60;
    el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    el.style.setProperty('--tr', (Math.random() * 360 - 180) + 'deg');
    el.style.left = (x - 12) + 'px';
    el.style.top  = (y - 12) + 'px';
    el.style.animationDelay = (i * 0.07) + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', function() { el.remove(); });
  }
}

function spawnTanuki(x, y) {
  const el = document.createElement('div');
  el.className = 'tanuki-popup';
  el.textContent = '🦝';
  el.dataset.text = 'もう一度！';
  el.style.left = (x - 20) + 'px';
  el.style.top  = (y - 20) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', function() { el.remove(); });
}

/* ===== BUILD ===== */
function buildExercises() {
  const container = document.getElementById('exerciseList');
  container.innerHTML = '';
  selectElements = [];
  let globalIndex = 0;

  exercises.forEach(function(section) {
    const secTitle = document.createElement('div');
    secTitle.className = 'section-title';
    secTitle.textContent = section.section;
    container.appendChild(secTitle);

    section.sentences.forEach(function(ex) {
      const card = document.createElement('div');
      card.className = 'card';

      const num = document.createElement('div');
      num.className = 'card-num';
      num.textContent = ++globalIndex;
      card.appendChild(num);

      const sent = document.createElement('div');
      sent.className = 'sentence';

      let blankIdx = 0;
      ex.parts.forEach(function(part) {
        if (part === null) {
          const blank = ex.blanks[blankIdx++];
          const sel = document.createElement('select');
          sel.className = 'unanswered';

          const ph = document.createElement('option');
          ph.value = '';
          ph.textContent = blank.options[0].length <= 2 ? '（　）' : '（　　　　）';
          ph.disabled = true; ph.selected = true;
          sel.appendChild(ph);

          blank.options.forEach(function(opt) {
            const o = document.createElement('option');
            o.value = opt; o.textContent = opt;
            sel.appendChild(o);
          });

          sel.dataset.correct = blank.correct;
          sel.addEventListener('change', function() {
            sel.classList.remove('unanswered','correct','wrong');
            sel.classList.add('unanswered');
            updateScore();
          });

          selectElements.push(sel);
          sent.appendChild(sel);
        } else {
          const span = document.createElement('span');
          span.textContent = part;
          sent.appendChild(span);
        }
      });

      card.appendChild(sent);
      const result = document.createElement('div');
      result.className = 'result-msg';
      card.appendChild(result);
      container.appendChild(card);
    });
  });
  updateScore();
}

function updateScore() {
  const answered = selectElements.filter(function(s){ return s.value !== ''; }).length;
  const correct  = selectElements.filter(function(s){ return s.classList.contains('correct'); }).length;
  document.getElementById('progressBar').style.width = (answered / selectElements.length * 100) + '%';
  if (checked) {
    document.getElementById('scoreDisplay').textContent = correct + ' / ' + selectElements.length + ' helyes';
  } else {
    document.getElementById('scoreDisplay').textContent = answered + ' / ' + selectElements.length + ' kitöltve';
  }
}

function checkAll() {
  checked = true;
  let correct = 0;
  const cards = document.querySelectorAll('.result-msg');
  let selIdx = 0;
  let cardIdx = 0;
  let delay = 0;

  exercises.forEach(function(section) {
    section.sentences.forEach(function(ex) {
      const resDiv = cards[cardIdx];
      const cardEl = resDiv.parentElement;
      resDiv.innerHTML = '';
      let allOk = true;

      ex.blanks.forEach(function() {
        const sel = selectElements[selIdx++];
        sel.classList.remove('unanswered','correct','wrong');
        const isCorrect = sel.value === sel.dataset.correct;

        if (isCorrect) {
          sel.classList.add('correct');
          correct++;
        } else {
          sel.classList.add('wrong');
          allOk = false;
          const badge = document.createElement('span');
          badge.className = 'item-result bad';
          badge.textContent = '✗ Helyes: ' + sel.dataset.correct;
          resDiv.appendChild(badge);
        }

        // Animate based on answer
        (function(s, ok) {
          setTimeout(function() {
            const rect = s.getBoundingClientRect();
            const cx = rect.left + rect.width / 2 + window.scrollX;
            const cy = rect.top + rect.height / 2 + window.scrollY;
            if (ok) { spawnFlower(cx, cy); }
            else     { spawnTanuki(cx, cy); }
          }, delay);
          delay += 120;
        })(sel, isCorrect);
      });

      if (allOk && ex.blanks.length > 0) {
        const badge = document.createElement('span');
        badge.className = 'item-result ok';
        badge.textContent = '✓ Helyes！';
        resDiv.appendChild(badge);
        cardEl.classList.add('card-correct');
      } else if (!allOk) {
        cardEl.classList.add('card-wrong');
      }

      cardIdx++;
    });
  });

  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('scoreDisplay').textContent = correct + ' / ' + selectElements.length + ' helyes';
  document.getElementById('finalScore').textContent = correct + ' / ' + selectElements.length;

  const total = selectElements.length;
  const pct = correct / total;
  document.getElementById('finalEmoji').textContent =
    pct === 1 ? '🌸🌸🌸 完璧！🌸🌸🌸' :
    pct >= 0.8 ? '🌸 Nagyon jó！' :
    pct >= 0.5 ? '🦝 Még lehet jobban！' :
    '🦝🦝 Próbáld újra！';

  setTimeout(function() {
    document.getElementById('finalPanel').classList.add('show');
    document.getElementById('finalPanel').scrollIntoView({behavior:'smooth',block:'center'});
  }, delay + 200);
}

function resetAll() {
  checked = false;
  document.getElementById('finalPanel').classList.remove('show');
  buildExercises();
}

buildExercises();
</script>
</body>
