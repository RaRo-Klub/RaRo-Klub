<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字ゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8;
    --red: #c0392b;
    --gold: #c9a84c;
    --faded: #8a7a6a;
    --light: #e8dfc8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px);
  }

  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 700;
    letter-spacing: 0.2em;
    margin: 20px 0 4px;
    color: var(--ink);
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--faded);
    letter-spacing: 0.15em;
    margin-bottom: 24px;
  }

  /* Mode selector */
  .mode-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--light);
    padding: 4px;
    border-radius: 6px;
  }

  .mode-tab {
    padding: 8px 18px;
    border: none;
    background: transparent;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 4px;
    color: var(--faded);
    transition: all 0.2s;
    letter-spacing: 0.08em;
  }
  .mode-tab.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* Score bar */
  .score-bar {
    display: flex;
    gap: 32px;
    margin-bottom: 28px;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
  }
  .score-item span:first-child { color: var(--faded); margin-right: 6px; }
  .score-item span:last-child { font-weight: 700; font-size: 1.1rem; }
  #streak-count { color: var(--red); }
  #score-count { color: var(--gold); }

  /* Card */
  .card {
    width: min(380px, 90vw);
    background: white;
    border: 1.5px solid rgba(0,0,0,0.12);
    border-radius: 8px;
    padding: 36px 28px 28px;
    text-align: center;
    box-shadow: 4px 6px 0 rgba(0,0,0,0.08);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--red), var(--gold));
  }

  .progress-indicator {
    position: absolute;
    top: 12px; right: 16px;
    font-size: 0.75rem;
    color: var(--faded);
    letter-spacing: 0.05em;
  }

  .card-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--faded);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .kanji-display {
    font-size: clamp(5rem, 18vw, 8rem);
    line-height: 1;
    font-weight: 900;
    color: var(--ink);
    margin-bottom: 8px;
    transition: transform 0.15s;
    display: block;
  }

  .hint-text {
    font-size: 0.9rem;
    color: var(--faded);
    min-height: 24px;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .question-text {
    font-size: 1.1rem;
    margin-bottom: 8px;
    color: var(--ink);
    letter-spacing: 0.08em;
  }

  /* Options */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 8px;
  }

  .opt-btn {
    padding: 14px 10px;
    border: 1.5px solid var(--light);
    background: var(--paper);
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
    color: var(--ink);
    letter-spacing: 0.05em;
    line-height: 1.3;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--ink);
    background: var(--light);
    transform: translateY(-1px);
  }

  .opt-btn.correct {
    background: #2ecc71;
    border-color: #27ae60;
    color: white;
    animation: pop 0.3s ease;
  }

  .opt-btn.wrong {
    background: #e74c3c;
    border-color: #c0392b;
    color: white;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  /* Result feedback */
  .feedback {
    font-size: 1rem;
    margin-top: 12px;
    min-height: 28px;
    font-weight: 700;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .feedback.correct { color: #27ae60; }
  .feedback.wrong { color: var(--red); }

  /* Next btn */
  .next-btn {
    margin-top: 18px;
    padding: 12px 40px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    display: none;
  }
  .next-btn:hover { background: #333; transform: translateY(-1px); }
  .next-btn.visible { display: inline-block; }

  /* End screen */
  .end-screen {
    display: none;
    text-align: center;
    padding: 20px;
  }
  .end-screen.visible { display: block; }
  .end-kanji {
    font-size: 5rem;
    font-weight: 900;
    margin: 10px 0;
  }
  .end-score {
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    margin: 10px 0;
  }
  .restart-btn {
    padding: 14px 50px;
    background: var(--red);
    color: white;
    border: none;
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 20px;
    transition: all 0.2s;
  }
  .restart-btn:hover { background: #a93226; }

  .game-wrapper { width: min(380px, 90vw); }
</style>
</head>
<body>

<h1>漢字ゲーム</h1>
<p class="subtitle">数字・時間の漢字を学ぼう</p>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="setMode('reading')">読み方</button>
  <button class="mode-tab" onclick="setMode('meaning')">意味</button>
  <button class="mode-tab" onclick="setMode('kanji')">漢字</button>
</div>

<div class="score-bar">
  <div class="score-item"><span>スコア</span><span id="score-count">0</span></div>
  <div class="score-item"><span>連続</span><span id="streak-count">🔥0</span></div>
  <div class="score-item"><span>問題</span><span id="q-count">1/10</span></div>
</div>

<div class="game-wrapper">
  <div class="card" id="game-card">
    <div class="progress-indicator" id="prog-indicator">1 / 10</div>
    <div class="card-label" id="card-label">この漢字の読み方は？</div>
    <span class="kanji-display" id="kanji-display">一</span>
    <div class="hint-text" id="hint-text"></div>
    <div class="options" id="options-grid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次へ →</button>
  </div>

  <div class="end-screen" id="end-screen">
    <div class="end-kanji">🎉</div>
    <p style="font-size:1.2rem;letter-spacing:0.1em;">ゲーム終了！</p>
    <div class="end-score" id="end-score-display"></div>
    <p id="end-message" style="color:var(--faded);font-size:0.9rem;letter-spacing:0.08em;"></p>
    <button class="restart-btn" onclick="restartGame()">もう一度</button>
  </div>
</div>

<script>
const kanjiData = [
  { kanji:'一', reading:'いち / ひとつ', meaning:'1', examples:['一つ','一月'] },
  { kanji:'二', reading:'に / ふたつ', meaning:'2', examples:['二つ','二月'] },
  { kanji:'三', reading:'さん / みっつ', meaning:'3', examples:['三つ','三月'] },
  { kanji:'四', reading:'し / よっつ', meaning:'4', examples:['四つ','四月'] },
  { kanji:'五', reading:'ご / いつつ', meaning:'5', examples:['五つ','五月'] },
  { kanji:'六', reading:'ろく / むっつ', meaning:'6', examples:['六つ','六月'] },
  { kanji:'七', reading:'しち / ななつ', meaning:'7', examples:['七つ','七月'] },
  { kanji:'八', reading:'はち / やっつ', meaning:'8', examples:['八つ','八月'] },
  { kanji:'九', reading:'く / きゅう', meaning:'9', examples:['九つ','九月'] },
  { kanji:'十', reading:'じゅう', meaning:'10', examples:['十','十月'] },
  { kanji:'百', reading:'ひゃく', meaning:'100', examples:['百円','三百'] },
  { kanji:'千', reading:'せん', meaning:'1000', examples:['千円','三千'] },
  { kanji:'万', reading:'まん / ばん', meaning:'10,000', examples:['一万','万円'] },
  { kanji:'円', reading:'えん', meaning:'円・丸い', examples:['百円','千円'] },
  { kanji:'時', reading:'じ / とき', meaning:'時間・時刻', examples:['三時','何時'] },
];

let mode = 'reading';
let questions = [];
let current = 0;
let score = 0;
let streak = 0;
let answered = false;
const TOTAL = 10;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  restartGame();
}

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function generateQuestions() {
  const pool = shuffle(kanjiData).slice(0, TOTAL);
  return pool.map(item => {
    // Get 3 wrong options
    const wrong = shuffle(kanjiData.filter(k => k.kanji !== item.kanji)).slice(0, 3);
    let correctOpt, wrongOpts, questionText, labelText;

    if (mode === 'reading') {
      labelText = 'この漢字の読み方は？';
      questionText = null;
      correctOpt = item.reading;
      wrongOpts = wrong.map(w => w.reading);
    } else if (mode === 'meaning') {
      labelText = 'この漢字の意味（数値）は？';
      questionText = null;
      correctOpt = item.meaning;
      wrongOpts = wrong.map(w => w.meaning);
    } else {
      // kanji mode: show reading, pick kanji
      labelText = 'この読みの漢字は？';
      questionText = item.reading;
      correctOpt = item.kanji;
      wrongOpts = wrong.map(w => w.kanji);
    }

    const options = shuffle([correctOpt, ...wrongOpts]);
    return { item, correctOpt, options, labelText, questionText };
  });
}

function render() {
  if (current >= TOTAL) { showEnd(); return; }
  answered = false;
  const q = questions[current];

  document.getElementById('prog-indicator').textContent = `${current+1} / ${TOTAL}`;
  document.getElementById('q-count').textContent = `${current+1}/${TOTAL}`;
  document.getElementById('card-label').textContent = q.labelText;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').classList.remove('visible');

  if (mode === 'kanji') {
    document.getElementById('kanji-display').textContent = '';
    document.getElementById('kanji-display').style.fontSize = '1.2rem';
    document.getElementById('hint-text').textContent = '';
    document.getElementById('kanji-display').textContent = q.questionText;
    document.getElementById('kanji-display').style.fontSize = 'clamp(1.4rem, 5vw, 2rem)';
  } else {
    document.getElementById('kanji-display').textContent = q.item.kanji;
    document.getElementById('kanji-display').style.fontSize = 'clamp(5rem, 18vw, 8rem)';
    document.getElementById('hint-text').textContent = `例：${q.item.examples.join('、')}`;
  }

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt, btn);
    grid.appendChild(btn);
  });
}

function checkAnswer(chosen, btn) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const correct = chosen === q.correctOpt;

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correctOpt) b.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  if (correct) {
    btn.classList.add('correct');
    score += 10;
    streak++;
    fb.textContent = `正解！ 🎊 ${mode !== 'meaning' ? '（' + q.item.meaning + '）' : ''}`;
    fb.className = 'feedback correct';
  } else {
    btn.classList.add('wrong');
    streak = 0;
    fb.textContent = `残念… 正解は「${q.correctOpt}」`;
    fb.className = 'feedback wrong';
  }

  document.getElementById('score-count').textContent = score;
  document.getElementById('streak-count').textContent = `🔥${streak}`;
  document.getElementById('next-btn').classList.add('visible');
}

function nextQuestion() {
  current++;
  render();
}

function showEnd() {
  document.getElementById('game-card').style.display = 'none';
  const es = document.getElementById('end-screen');
  es.classList.add('visible');
  document.getElementById('end-score-display').textContent = `${score} 点`;
  const pct = score / (TOTAL * 10) * 100;
  let msg = pct >= 80 ? '素晴らしい！漢字マスター！🏆' : pct >= 50 ? 'よくできました！もう一度挑戦！✨' : 'もっと練習しましょう！💪';
  document.getElementById('end-message').textContent = msg;
}

function restartGame() {
  current = 0; score = 0; streak = 0;
  questions = generateQuestions();
  document.getElementById('score-count').textContent = 0;
  document.getElementById('streak-count').textContent = '🔥0';
  document.getElementById('game-card').style.display = 'block';
  document.getElementById('end-screen').classList.remove('visible');
  render();
}

restartGame();
</script>
</body>
</html>
